# Repository root must contain the `inventory-management-system/` folder (see paths below).

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory-management-system/backend

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET: "ci-test-secret-key-at-least-32-characters-long"
      ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: inventory-management-system/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Ruff lint
        run: ruff check app

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=75 -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: inventory-management-system/backend/coverage.xml
